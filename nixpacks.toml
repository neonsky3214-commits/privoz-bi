[phases.setup]
nixPkgs = ["python311", "stdenv.cc.cc.lib"]

[phases.install]
cmds = [
  "python -m venv /app/venv",
  "/app/venv/bin/pip install -r backend/requirements.txt"
]

[start]
cmd = "cd backend && /app/venv/bin/python -c 'from db import init_db; init_db()' && /app/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
