[phases.setup]
nixPkgs = ["python311", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
  "python -m venv /app/venv",
  "/app/venv/bin/pip install --upgrade pip --quiet",
  "/app/venv/bin/pip install -r backend/requirements.txt --quiet",
  "npm --prefix frontend install --silent"
]

[phases.build]
cmds = [
  "npm --prefix frontend run build",
  "cp -r frontend/dist backend/frontend_dist"
]

[start]
cmd = "cd backend && /app/venv/bin/python -c 'from db import init_db; init_db()' && /app/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
